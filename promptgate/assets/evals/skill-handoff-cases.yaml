cases:
  - id: explicit_skill_handoff
    input: "$example-low-risk-skill 이거 정리해서 자연스럽게 만들어줘"
    registered_skills:
      - id: example-low-risk-skill
        risk_level: low
        auto_invocable: true
    expected:
      target_source: explicit
      target_skill: example-low-risk-skill
      status: auto_handoff

  - id: missing_explicit_skill
    input: "$missing-skill 이거 정리해줘"
    registered_skills:
      - id: example-low-risk-skill
        risk_level: low
        auto_invocable: true
    expected:
      target_source: none
      target_skill: null
      status: skill_not_found

  - id: no_fake_skill
    input: "내 의도를 정리해서 맞는 스킬로 보내줘"
    registered_skills: []
    expected:
      target_source: none
      target_skill: null
      status: no_match

  - id: explicit_skill_beats_inferred_text
    input: "$example-low-risk-skill 배포 말고 릴리스 노트 문장만 다듬어줘"
    registered_skills:
      - id: example-low-risk-skill
        risk_level: low
        auto_invocable: true
      - id: release-skill
        risk_level: high
        auto_invocable: true
    expected:
      target_source: explicit
      target_skill: example-low-risk-skill
      status: auto_handoff

  - id: registry_mismatch_no_hallucinated_skill
    input: "보안 점검 스킬로 보내서 취약점 봐줘"
    registered_skills:
      - id: example-low-risk-skill
        risk_level: low
        auto_invocable: true
    expected:
      target_source: none
      target_skill: null
      status: no_match
