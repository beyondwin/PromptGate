cases:
  - id: no_code_direction
    input: "이거 별론데 코드말고 방향만"
    expected:
      refined_prompt_includes:
        - "코드는 작성하지 말고"
        - "개선 방향"
      exclusions:
        - "code"
      output_preferences:
        - "direction"
      clarification_needed: false

  - id: natural_rewrite
    input: "이 문장 정리좀 너무 AI같지 않게"
    expected:
      refined_prompt_includes:
        - "자연스럽게"
        - "과장"
      output_preferences:
        - "natural"
      clarification_needed: false

  - id: table_korean_short_output
    input: "이 내용 한국어로 짧게 표로 정리해줘"
    expected:
      refined_prompt_includes:
        - "한국어"
        - "짧게"
        - "표"
      output_preferences:
        - "Korean"
        - "concise"
        - "table"
      clarification_needed: false

  - id: mixed_research_implement_deploy_no_over_handoff
    input: "Stripe 찾아보고 구현하고 바로 배포까지 해줘 근데 위험하면 물어봐"
    registered_skills:
      - id: example-low-risk-skill
        risk_level: low
        auto_invocable: true
    expected:
      goal_includes:
        - "조사"
        - "구현"
        - "배포"
      solution_candidates:
        - "Stripe"
      target_source: none
      target_skill: null
      status: no_match
      requires_confirmation: true
